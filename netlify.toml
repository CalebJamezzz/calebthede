[build]
  publish = "."
  functions = "netlify/functions"

# -- Maintenance mode --
# To enable: uncomment the maintenance block and comment out the others
# [[redirects]]
#   from = "/*"
#   to = "/maintenance.html"
#   status = 302
#   force = true

# -- Clean URL rewrites (serve /about instead of /about.html) --
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/projects"
  to = "/projects.html"
  status = 200

[[redirects]]
  from = "/library"
  to = "/library.html"
  status = 200

[[redirects]]
  from = "/lab"
  to = "/lab.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# -- API function routes --
[[redirects]]
  from = "/api/ask"
  to = "/.netlify/functions/ask"
  status = 200
  force = true

# -- 404 fallback --
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
